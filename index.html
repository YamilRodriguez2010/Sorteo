<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador</title>
    <!-- Bootstrap 5 para estructura profesional -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg-dark: #121212; --card-bg: #1e1e1e; --accent: #00bcd4; --text: #e0e0e0; }
        body { background-color: var(--bg-dark); color: var(--text); padding-top: 20px; font-family: 'Segoe UI', sans-serif; }
        .card { background-color: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid #333; }
        .form-control { background-color: #2c2c2c; border: 1px solid #444; color: white; border-radius: 10px; padding: 12px; }
        .form-control:focus { background-color: #2c2c2c; border-color: var(--accent); color: white; box-shadow: none; }
        h2 { font-weight: 300; letter-spacing: 1px; color: var(--accent); }
        .table { color: var(--text); border-collapse: separate; border-spacing: 0 10px; }
        .table thead th { border: none; font-size: 0.9rem; text-transform: uppercase; color: #888; }
        .table tbody tr { background-color: #252525; border-radius: 10px; }
        .table tbody td { border: none; padding: 15px; }
        .table tbody tr td:first-child { border-radius: 10px 0 0 10px; }
        .table tbody tr td:last-child { border-radius: 0 10px 10px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card p-4">
        <h2 class="text-center mb-4">Buscador</h2>
        
        <div class="mb-4">
            <label class="form-label text-muted small">Cargar archivo Excel (.xlsx)</label>
            <input type="file" id="inputExcel" class="form-control" accept=".xlsx, .xls">
        </div>

        <div class="mb-4">
            <input type="text" id="buscador" class="form-control" onkeyup="filtrar()" placeholder="🔍 Escribe para filtrar..." disabled>
        </div>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr><th>Nombre</th><th>Número</th></tr>
                </thead>
                <tbody id="cuerpoTabla">
                    <!-- Los datos se cargarán aquí -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.getElementById('inputExcel').addEventListener('change', function(e) {
        let reader = new FileReader();
        reader.onload = function(e) {
            let data = new Uint8Array(e.target.result);
            let workbook = XLSX.read(data, {type: 'array'});
            let firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            let rows = XLSX.utils.sheet_to_json(firstSheet, {header: 1});

            let cuerpo = document.getElementById("cuerpoTabla");
            cuerpo.innerHTML = "";

            rows.forEach((row, index) => {
                if (index === 0) return; // Salta la cabecera
                if(row[0] || row[1]) {
                    cuerpo.innerHTML += `<tr><td>${row[0] || '-'}</td><td>${row[1] || '-'}</td></tr>`;
                }
            });
            document.getElementById("buscador").disabled = false;
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function filtrar() {
        let input = document.getElementById("buscador").value.toLowerCase();
        let filas = document.querySelectorAll("#cuerpoTabla tr");
        filas.forEach(fila => {
            fila.style.display = fila.textContent.toLowerCase().includes(input) ? "" : "none";
        });
    }
</script>
</body>
</html>
